<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="scummvm-192.png" />
    <title>King's Quest III</title>
    <style>
      :root {
        --bg-top: #150d28;
        --bg-bottom: #040507;
        --gold: #e3bb67;
        --gold-dim: #8e6322;
        --paper: #efe2bf;
        --paper-dark: #3a2611;
        --magenta: #d34cf0;
        --scene-rgb: 84, 44, 126;
        --scene-deep-rgb: 24, 12, 36;
        --scene-top-rgb: 104, 82, 188;
        --scene-bottom-rgb: 156, 88, 38;
        --scene-left-rgb: 82, 88, 196;
        --scene-right-rgb: 152, 84, 46;
        --scene-top-left-rgb: 98, 90, 210;
        --scene-top-right-rgb: 126, 78, 182;
        --scene-bottom-left-rgb: 104, 120, 108;
        --scene-bottom-right-rgb: 170, 98, 44;
        --scene-border-rgb: 108, 68, 150;
        --edge-0-rgb: 98, 94, 220;
        --edge-1-rgb: 88, 102, 232;
        --edge-2-rgb: 94, 106, 236;
        --edge-3-rgb: 110, 100, 224;
        --edge-4-rgb: 124, 92, 204;
        --edge-5-rgb: 132, 88, 182;
        --edge-6-rgb: 164, 94, 64;
        --edge-7-rgb: 178, 102, 46;
        --edge-8-rgb: 174, 102, 40;
        --edge-9-rgb: 154, 108, 48;
        --edge-10-rgb: 116, 122, 82;
        --edge-11-rgb: 96, 134, 118;
        --edge-12-rgb: 78, 128, 170;
        --edge-13-rgb: 78, 114, 192;
        --edge-14-rgb: 84, 104, 210;
        --edge-15-rgb: 92, 98, 220;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 18% 48%, rgba(var(--scene-left-rgb), 0.26), transparent 28%),
          radial-gradient(circle at 82% 48%, rgba(var(--scene-right-rgb), 0.26), transparent 28%),
          radial-gradient(circle at 20% 16%, rgba(var(--scene-top-left-rgb), 0.24), transparent 20%),
          radial-gradient(circle at 38% 12%, rgba(var(--edge-1-rgb), 0.2), transparent 16%),
          radial-gradient(circle at 62% 12%, rgba(var(--edge-2-rgb), 0.2), transparent 16%),
          radial-gradient(circle at 80% 16%, rgba(var(--scene-top-right-rgb), 0.24), transparent 20%),
          radial-gradient(circle at 28% 84%, rgba(var(--scene-bottom-left-rgb), 0.14), transparent 18%),
          radial-gradient(circle at 72% 84%, rgba(var(--scene-bottom-right-rgb), 0.14), transparent 18%),
          radial-gradient(circle at top, rgba(var(--scene-rgb), 0.22), transparent 24%),
          linear-gradient(180deg, rgb(var(--scene-deep-rgb)), var(--bg-bottom));
        color: var(--paper);
        font-family: Georgia, "Times New Roman", serif;
        transition: background 120ms ease-out;
      }

      .loading-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .loading-card {
        position: relative;
        width: min(1100px, 100%);
        min-height: min(86vh, 760px);
        overflow: hidden;
        border: 1px solid transparent;
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(12, 13, 20, 0.94), rgba(8, 6, 12, 0.97));
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(var(--scene-border-rgb), 0.22),
          -34px 0 96px rgba(var(--scene-left-rgb), 0.22),
          34px 0 96px rgba(var(--scene-right-rgb), 0.22),
          0 -16px 84px rgba(var(--scene-top-rgb), 0.34),
          0 22px 80px rgba(var(--scene-bottom-rgb), 0.2),
          -24px -16px 68px rgba(var(--scene-top-left-rgb), 0.22),
          24px -16px 68px rgba(var(--scene-top-right-rgb), 0.22),
          -24px 20px 68px rgba(var(--scene-bottom-left-rgb), 0.16),
          24px 20px 68px rgba(var(--scene-bottom-right-rgb), 0.16),
          0 0 128px rgba(var(--scene-rgb), 0.08);
        transition: border-color 120ms ease-out, box-shadow 120ms ease-out;
      }

      .loading-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          repeating-linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.02) 0,
            rgba(255, 255, 255, 0.02) 2px,
            transparent 2px,
            transparent 6px
          );
        pointer-events: none;
      }

      .loading-card::after {
        content: "";
        position: absolute;
        inset: 0;
        padding: 1px;
        border-radius: inherit;
        background:
          conic-gradient(
            from 180deg at 50% 50%,
            rgba(var(--edge-15-rgb), 0.96) 0deg,
            rgba(var(--edge-14-rgb), 0.95) 22deg,
            rgba(var(--edge-13-rgb), 0.94) 45deg,
            rgba(var(--edge-12-rgb), 0.92) 67deg,
            rgba(var(--edge-11-rgb), 0.9) 90deg,
            rgba(var(--edge-10-rgb), 0.88) 112deg,
            rgba(var(--edge-9-rgb), 0.88) 135deg,
            rgba(var(--edge-8-rgb), 0.9) 157deg,
            rgba(var(--edge-7-rgb), 0.94) 180deg,
            rgba(var(--edge-6-rgb), 0.92) 202deg,
            rgba(var(--edge-5-rgb), 0.9) 225deg,
            rgba(var(--edge-4-rgb), 0.92) 247deg,
            rgba(var(--edge-3-rgb), 0.95) 270deg,
            rgba(var(--edge-2-rgb), 0.98) 292deg,
            rgba(var(--edge-1-rgb), 0.98) 315deg,
            rgba(var(--edge-0-rgb), 0.97) 337deg,
            rgba(var(--edge-15-rgb), 0.96) 360deg
          );
        -webkit-mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      #progress {
        position: absolute;
        inset: auto 1.35rem 1.2rem 1.35rem;
        width: calc(100% - 2.7rem);
        height: 10px;
        z-index: 4;
        border: 0;
        background: rgba(88, 41, 11, 0.9);
        overflow: hidden;
        transition: opacity 220ms ease;
      }

      progress::-moz-progress-bar {
        background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      }

      progress::-webkit-progress-value {
        background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      }

      progress {
        color: var(--gold);
      }

      #status {
        position: absolute;
        left: 1.35rem;
        right: 1.35rem;
        bottom: 2.35rem;
        z-index: 4;
        padding: 0.8rem 1rem;
        border: 1px solid rgba(227, 187, 103, 0.28);
        border-radius: 14px;
        background: rgba(25, 13, 33, 0.9);
        color: var(--paper);
        font: 700 0.92rem/1.4 Georgia, "Times New Roman", serif;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: opacity 220ms ease;
      }

      #status.error {
        background: #7a1e22;
      }

      .emscripten_border {
        position: absolute;
        inset: 0;
      }

      .canvas-mask {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(211, 76, 240, 0.12), transparent 28%),
          linear-gradient(180deg, #12071e, #05060a);
        transition: opacity 260ms ease;
      }

      .mask-card {
        width: min(980px, calc(100% - 3rem));
        aspect-ratio: 4 / 3;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 1.5rem;
      }

      .mask-art {
        width: min(520px, 72vw);
        max-height: min(62vh, 700px);
        display: block;
        margin: 0 auto 1.2rem;
        border-radius: 18px;
        border: 1px solid rgba(235, 195, 112, 0.28);
        box-shadow:
          0 20px 44px rgba(0, 0, 0, 0.52),
          0 0 0 1px rgba(255, 214, 140, 0.08);
        object-fit: contain;
        filter:
          drop-shadow(0 2px 0 rgba(0, 0, 0, 0.55))
          drop-shadow(0 12px 28px rgba(0, 0, 0, 0.45));
      }

      .mask-card p,
      .mask-card h2 {
        margin: 0;
      }

      .mask-eyebrow {
        color: #d5c290;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: 0.78rem;
        margin-bottom: 0.65rem;
      }

      .mask-card h2 {
        color: var(--gold);
        font-size: clamp(2.2rem, 5vw, 4.6rem);
        line-height: 0.92;
        text-shadow:
          0 2px 0 #563200,
          0 8px 26px rgba(0, 0, 0, 0.65);
      }

      .mask-copy {
        margin-top: 0.7rem;
        color: #f1dfbb;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 0.82rem;
      }

      canvas.emscripten {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        border: 0;
        background:
          radial-gradient(circle at top, rgba(211, 76, 240, 0.08), transparent 28%),
          linear-gradient(180deg, #080a11, #020304);
        opacity: 0;
        transition: opacity 260ms ease;
      }

      textarea.emscripten {
        display: none;
      }

      .runtime-live #progress,
      .runtime-live #status {
        opacity: 0;
        pointer-events: none;
      }

      .runtime-live #status {
        display: none;
      }

      .runtime-live canvas.emscripten {
        opacity: 1;
      }

      .runtime-live .canvas-mask {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main class="loading-shell">
      <section class="loading-card">
        <progress hidden id="progress" max="100" value="0"></progress>
        <div id="status">Summoning the adventure...</div>
        <div class="emscripten_border">
          <div class="canvas-mask" id="canvas-mask">
            <div class="mask-card">
              <div>
                <p class="mask-eyebrow">Sierra Web Edition</p>
                <img class="mask-art" src="wizard-launch.jpeg" alt="King's Quest III wizard artwork" />
                <h2>King's Quest III</h2>
                <p class="mask-copy">Entering the Kingdom</p>
              </div>
            </div>
          </div>
          <canvas
            class="emscripten"
            id="canvas"
            tabindex="-1"
            oncontextmenu="event.preventDefault()"
          ></canvas>
        </div>
        <textarea class="emscripten" id="output" rows="8"></textarea>
      </section>
    </main>
    <script>
      document.title = "King's Quest III";

      var titleLock = window.setInterval(function () {
        if (document.title !== "King's Quest III") {
          document.title = "King's Quest III";
        }
      }, 250);

      var statusElement = document.getElementById("status");
      var progressElement = document.getElementById("progress");
      var runtimeVersion = "20260409j";
      var siteBasePath = window.location.pathname.replace(/[^/]*$/, "");
      var normalizedBasePath = siteBasePath.endsWith("/") ? siteBasePath.slice(0, -1) : siteBasePath;
      var gameDataRoot = normalizedBasePath + "/data";
      var gameDataPath = "/data/games/kq3";
      var loadingCard = document.querySelector(".loading-card");
      var bodyElement = document.body;
      var gameUnlocked = false;
      var unlockTimer = null;
      var sceneSamplerTimer = null;
      var sceneAnimatorFrame = null;
      var sceneCurrentState = null;
      var sceneTargetState = null;
      var sceneSamplerCanvas = document.createElement("canvas");
      var sceneSamplerContext = sceneSamplerCanvas.getContext("2d", { willReadFrequently: true });

      sceneSamplerCanvas.width = 40;
      sceneSamplerCanvas.height = 25;

      function loadingDoneMessage() {
        document.getElementById("progress").style.zIndex = 0;
        return "Entering the kingdom.";
      }

      function markRuntimeLive() {
        loadingCard.classList.add("runtime-live");
        startSceneSampling();
        window.setTimeout(function () {
          window.clearInterval(titleLock);
          document.title = "King's Quest III";
        }, 1500);
      }

      function blendColor(rgb, multiplier, offset, minimums) {
        return [
          Math.max(minimums[0], Math.min(255, Math.round(rgb[0] * multiplier + offset))),
          Math.max(minimums[1], Math.min(255, Math.round(rgb[1] * multiplier + offset))),
          Math.max(minimums[2], Math.min(255, Math.round(rgb[2] * multiplier + offset)))
        ];
      }

      function saturateColor(rgb, boost, floor) {
        var max = Math.max(rgb[0], rgb[1], rgb[2]);
        var min = Math.min(rgb[0], rgb[1], rgb[2]);
        var midpoint = (max + min) / 2;
        return [
          Math.max(floor[0], Math.min(255, Math.round(midpoint + (rgb[0] - midpoint) * boost))),
          Math.max(floor[1], Math.min(255, Math.round(midpoint + (rgb[1] - midpoint) * boost))),
          Math.max(floor[2], Math.min(255, Math.round(midpoint + (rgb[2] - midpoint) * boost)))
        ];
      }

      function averageColors(colors) {
        var red = 0;
        var green = 0;
        var blue = 0;

        for (var colorIndex = 0; colorIndex < colors.length; colorIndex += 1) {
          red += colors[colorIndex][0];
          green += colors[colorIndex][1];
          blue += colors[colorIndex][2];
        }

        return [
          Math.round(red / colors.length),
          Math.round(green / colors.length),
          Math.round(blue / colors.length)
        ];
      }

      function maxChannelDelta(left, right) {
        return Math.max(
          Math.abs(left[0] - right[0]),
          Math.abs(left[1] - right[1]),
          Math.abs(left[2] - right[2])
        );
      }

      function lerpColor(from, to, amount) {
        return [
          Math.round(from[0] + (to[0] - from[0]) * amount),
          Math.round(from[1] + (to[1] - from[1]) * amount),
          Math.round(from[2] + (to[2] - from[2]) * amount)
        ];
      }

      function applySceneState(state) {
        bodyElement.style.setProperty("--scene-rgb", state.scene.join(", "));
        bodyElement.style.setProperty("--scene-deep-rgb", state.deep.join(", "));
        bodyElement.style.setProperty("--scene-border-rgb", state.border.join(", "));
        bodyElement.style.setProperty("--scene-top-rgb", state.top.join(", "));
        bodyElement.style.setProperty("--scene-bottom-rgb", state.bottom.join(", "));
        bodyElement.style.setProperty("--scene-left-rgb", state.left.join(", "));
        bodyElement.style.setProperty("--scene-right-rgb", state.right.join(", "));
        bodyElement.style.setProperty("--scene-top-left-rgb", state.topLeft.join(", "));
        bodyElement.style.setProperty("--scene-top-right-rgb", state.topRight.join(", "));
        bodyElement.style.setProperty("--scene-bottom-left-rgb", state.bottomLeft.join(", "));
        bodyElement.style.setProperty("--scene-bottom-right-rgb", state.bottomRight.join(", "));
        for (var edgeIndex = 0; edgeIndex < state.edges.length; edgeIndex += 1) {
          bodyElement.style.setProperty("--edge-" + edgeIndex + "-rgb", state.edges[edgeIndex].join(", "));
        }
      }

      function animateSceneTint() {
        if (!sceneCurrentState || !sceneTargetState) {
          sceneAnimatorFrame = null;
          return;
        }

        var nextState = { edges: [] };
        var keys = [
          "scene",
          "deep",
          "border",
          "top",
          "bottom",
          "left",
          "right",
          "topLeft",
          "topRight",
          "bottomLeft",
          "bottomRight"
        ];
        var settled = true;

        for (var keyIndex = 0; keyIndex < keys.length; keyIndex += 1) {
          var key = keys[keyIndex];
          nextState[key] = lerpColor(sceneCurrentState[key], sceneTargetState[key], 0.18);
          if (maxChannelDelta(nextState[key], sceneTargetState[key]) > 3) {
            settled = false;
          }
        }

        for (var edgeStateIndex = 0; edgeStateIndex < sceneTargetState.edges.length; edgeStateIndex += 1) {
          var edgeColor = lerpColor(sceneCurrentState.edges[edgeStateIndex], sceneTargetState.edges[edgeStateIndex], 0.22);
          nextState.edges.push(edgeColor);
          if (maxChannelDelta(edgeColor, sceneTargetState.edges[edgeStateIndex]) > 4) {
            settled = false;
          }
        }

        sceneCurrentState = settled ? sceneTargetState : nextState;
        applySceneState(sceneCurrentState);

        if (settled) {
          sceneAnimatorFrame = null;
          return;
        }

        sceneAnimatorFrame = window.requestAnimationFrame(animateSceneTint);
      }

      function setSceneTint(rgb, edgeRegions) {
        var topLeftRgb = averageColors([edgeRegions[15], edgeRegions[0]]);
        var topRgb = averageColors([edgeRegions[0], edgeRegions[1], edgeRegions[2], edgeRegions[3]]);
        var topRightRgb = averageColors([edgeRegions[3], edgeRegions[4]]);
        var rightRgb = averageColors([edgeRegions[4], edgeRegions[5], edgeRegions[6], edgeRegions[7]]);
        var bottomRightRgb = averageColors([edgeRegions[7], edgeRegions[8]]);
        var bottomRgb = averageColors([edgeRegions[8], edgeRegions[9], edgeRegions[10], edgeRegions[11]]);
        var bottomLeftRgb = averageColors([edgeRegions[11], edgeRegions[12]]);
        var leftRgb = averageColors([edgeRegions[12], edgeRegions[13], edgeRegions[14], edgeRegions[15]]);
        var deep = [
          Math.max(6, Math.round(rgb[0] * 0.22)),
          Math.max(6, Math.round(rgb[1] * 0.22)),
          Math.max(8, Math.round(rgb[2] * 0.26))
        ];
        var border = saturateColor(blendColor(rgb, 0.92, 28, [26, 26, 34]), 1.35, [26, 26, 34]);
        var top = saturateColor(blendColor(topRgb, 1.18, 22, [28, 32, 72]), 1.65, [28, 32, 72]);
        var bottom = saturateColor(blendColor(bottomRgb, 1.02, 16, [36, 24, 18]), 1.45, [36, 24, 18]);
        var left = saturateColor(blendColor(leftRgb, 1.16, 20, [24, 34, 66]), 1.6, [24, 34, 66]);
        var right = saturateColor(blendColor(rightRgb, 1.06, 16, [30, 24, 22]), 1.45, [30, 24, 22]);
        var topLeft = saturateColor(blendColor(topLeftRgb, 1.24, 18, [26, 34, 82]), 1.7, [26, 34, 82]);
        var topRight = saturateColor(blendColor(topRightRgb, 1.18, 18, [28, 30, 76]), 1.65, [28, 30, 76]);
        var bottomLeft = saturateColor(blendColor(bottomLeftRgb, 1.02, 18, [28, 34, 24]), 1.42, [28, 34, 24]);
        var bottomRight = saturateColor(blendColor(bottomRightRgb, 1.06, 16, [38, 24, 18]), 1.5, [38, 24, 18]);
        var vividEdges = [];
        for (var edgeIndex = 0; edgeIndex < edgeRegions.length; edgeIndex += 1) {
          vividEdges.push(saturateColor(edgeRegions[edgeIndex], 1.9, [22, 22, 22]));
        }

        sceneTargetState = {
          scene: rgb,
          deep: deep,
          border: border,
          top: top,
          bottom: bottom,
          left: left,
          right: right,
          topLeft: topLeft,
          topRight: topRight,
          bottomLeft: bottomLeft,
          bottomRight: bottomRight,
          edges: vividEdges
        };

        if (!sceneCurrentState) {
          sceneCurrentState = sceneTargetState;
          applySceneState(sceneCurrentState);
          return;
        }

        if (sceneAnimatorFrame === null) {
          sceneAnimatorFrame = window.requestAnimationFrame(animateSceneTint);
        }
      }

      function sampleSceneTint() {
        var canvas = Module.canvas;
        if (!canvas || !canvas.width || !canvas.height) {
          return;
        }

        var sourceWidth = canvas.width;
        var sourceHeight = canvas.height;
        var cropTop = Math.max(8, Math.floor(sourceHeight * 0.11));
        var cropHeight = Math.max(1, sourceHeight - cropTop);

        sceneSamplerContext.drawImage(
          canvas,
          0,
          cropTop,
          sourceWidth,
          cropHeight,
          0,
          0,
          sceneSamplerCanvas.width,
          sceneSamplerCanvas.height
        );

        var imageData = sceneSamplerContext.getImageData(
          0,
          0,
          sceneSamplerCanvas.width,
          sceneSamplerCanvas.height
        ).data;

        var totalWeight = 0;
        var red = 0;
        var green = 0;
        var blue = 0;
        var rowWidth = sceneSamplerCanvas.width;
        var rowHeight = sceneSamplerCanvas.height;

        function createBucket() {
          return { weight: 0, red: 0, green: 0, blue: 0 };
        }

        var buckets = [];
        for (var bucketIndex = 0; bucketIndex < 16; bucketIndex += 1) {
          buckets.push(createBucket());
        }

        function addToBucket(bucket, r, g, b, weight) {
          bucket.red += r * weight;
          bucket.green += g * weight;
          bucket.blue += b * weight;
          bucket.weight += weight;
        }

        function readBucket(bucket, fallback) {
          if (!bucket.weight) {
            return fallback;
          }

          return [
            Math.round(bucket.red / bucket.weight),
            Math.round(bucket.green / bucket.weight),
            Math.round(bucket.blue / bucket.weight)
          ];
        }

        function normalizeRange(start, end, size) {
          var boundedStart = Math.max(0, Math.min(size - 1, start));
          var boundedEnd = Math.max(boundedStart, Math.min(size - 1, end));
          return { start: boundedStart, end: boundedEnd };
        }

        function sampleRangeCount(start, end, fixedIndex, horizontal) {
          var count = 0;
          if (horizontal) {
            for (var sampleX = start; sampleX <= end; sampleX += 1) {
              var horizontalOffset = (fixedIndex * rowWidth + sampleX) * 4;
              var horizontalBrightness = imageData[horizontalOffset] + imageData[horizontalOffset + 1] + imageData[horizontalOffset + 2];
              if (imageData[horizontalOffset + 3] >= 32 && horizontalBrightness >= 42) {
                count += 1;
              }
            }
          } else {
            for (var sampleY = start; sampleY <= end; sampleY += 1) {
              var verticalOffset = (sampleY * rowWidth + fixedIndex) * 4;
              var verticalBrightness = imageData[verticalOffset] + imageData[verticalOffset + 1] + imageData[verticalOffset + 2];
              if (imageData[verticalOffset + 3] >= 32 && verticalBrightness >= 42) {
                count += 1;
              }
            }
          }
          return count;
        }

        var contentTop = 0;
        var contentBottom = rowHeight - 1;
        var contentLeft = 0;
        var contentRight = rowWidth - 1;
        var minRowPixels = Math.max(3, Math.floor(rowWidth * 0.18));
        var minColumnPixels = Math.max(3, Math.floor(rowHeight * 0.18));

        while (contentTop < rowHeight - 1 && sampleRangeCount(0, rowWidth - 1, contentTop, true) < minRowPixels) {
          contentTop += 1;
        }
        while (contentBottom > contentTop && sampleRangeCount(0, rowWidth - 1, contentBottom, true) < minRowPixels) {
          contentBottom -= 1;
        }
        while (contentLeft < rowWidth - 1 && sampleRangeCount(contentTop, contentBottom, contentLeft, false) < minColumnPixels) {
          contentLeft += 1;
        }
        while (contentRight > contentLeft && sampleRangeCount(contentTop, contentBottom, contentRight, false) < minColumnPixels) {
          contentRight -= 1;
        }

        var contentWidth = Math.max(1, contentRight - contentLeft + 1);
        var contentHeight = Math.max(1, contentBottom - contentTop + 1);
        var edgeThicknessX = Math.max(2, Math.floor(contentWidth * 0.12));
        var edgeThicknessY = Math.max(2, Math.floor(contentHeight * 0.14));
        var topBand = normalizeRange(contentTop, contentTop + edgeThicknessY - 1, rowHeight);
        var bottomBand = normalizeRange(contentBottom - edgeThicknessY + 1, contentBottom, rowHeight);
        var leftBand = normalizeRange(contentLeft, contentLeft + edgeThicknessX - 1, rowWidth);
        var rightBand = normalizeRange(contentRight - edgeThicknessX + 1, contentRight, rowWidth);
