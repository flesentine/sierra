<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="scummvm-192.png" />
    <title>King's Quest III</title>
    <style>
      :root {
        --bg-top: #150d28;
        --bg-bottom: #040507;
        --gold: #e3bb67;
        --gold-dim: #8e6322;
        --paper: #efe2bf;
        --paper-dark: #3a2611;
        --magenta: #d34cf0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(211, 76, 240, 0.2), transparent 22%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        color: var(--paper);
        font-family: Georgia, "Times New Roman", serif;
      }

      .loading-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .loading-card {
        position: relative;
        width: min(1100px, 100%);
        min-height: min(86vh, 760px);
        overflow: hidden;
        border: 1px solid rgba(227, 187, 103, 0.28);
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(12, 13, 20, 0.94), rgba(8, 6, 12, 0.97));
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      .loading-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          repeating-linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.02) 0,
            rgba(255, 255, 255, 0.02) 2px,
            transparent 2px,
            transparent 6px
          );
        pointer-events: none;
      }

      .title-overlay {
        position: absolute;
        inset: 1.2rem 1.2rem auto;
        z-index: 3;
        pointer-events: none;
        text-align: center;
        transition: opacity 220ms ease;
      }

      .title-overlay p,
      .title-overlay h1 {
        margin: 0;
      }

      .eyebrow {
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-size: 0.78rem;
        color: #d6c398;
        margin-bottom: 0.4rem;
      }

      .title-overlay h1 {
        color: var(--gold);
        font-size: clamp(2.4rem, 6vw, 4.8rem);
        line-height: 0.92;
        text-shadow:
          0 2px 0 #563200,
          0 8px 26px rgba(0, 0, 0, 0.65);
      }

      .subtitle {
        margin-top: 0.35rem;
        color: #f0a6ff;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-size: 0.82rem;
      }

      #progress {
        position: absolute;
        inset: auto 1.35rem 1.2rem 1.35rem;
        width: calc(100% - 2.7rem);
        height: 10px;
        z-index: 4;
        border: 0;
        background: rgba(88, 41, 11, 0.9);
        overflow: hidden;
        transition: opacity 220ms ease;
      }

      progress::-moz-progress-bar {
        background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      }

      progress::-webkit-progress-value {
        background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      }

      progress {
        color: var(--gold);
      }

      #status {
        position: absolute;
        left: 1.35rem;
        right: 1.35rem;
        bottom: 2.35rem;
        z-index: 4;
        padding: 0.8rem 1rem;
        border: 1px solid rgba(227, 187, 103, 0.28);
        border-radius: 14px;
        background: rgba(25, 13, 33, 0.9);
        color: var(--paper);
        font: 700 0.92rem/1.4 Georgia, "Times New Roman", serif;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: opacity 220ms ease;
      }

      #status.error {
        background: #7a1e22;
      }

      .emscripten_border {
        position: absolute;
        inset: 0;
      }

      canvas.emscripten {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        border: 0;
        background:
          radial-gradient(circle at top, rgba(211, 76, 240, 0.08), transparent 28%),
          linear-gradient(180deg, #080a11, #020304);
      }

      textarea.emscripten {
        display: none;
      }

      .runtime-live .title-overlay,
      .runtime-live #progress,
      .runtime-live #status {
        opacity: 0;
        pointer-events: none;
      }

      .runtime-live #status {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="loading-shell">
      <section class="loading-card">
        <div class="title-overlay">
          <p class="eyebrow">Sierra Web Edition</p>
          <h1>King's Quest III</h1>
          <p class="subtitle">Loading the Castle of Llewdor</p>
        </div>
        <progress hidden id="progress" max="100" value="0"></progress>
        <div id="status">Summoning the adventure...</div>
        <div class="emscripten_border">
          <canvas
            class="emscripten"
            id="canvas"
            tabindex="-1"
            oncontextmenu="event.preventDefault()"
          ></canvas>
        </div>
        <textarea class="emscripten" id="output" rows="8"></textarea>
      </section>
    </main>
    <script>
      var statusElement = document.getElementById("status");
      var progressElement = document.getElementById("progress");
      var runtimeVersion = "20260408b";
      var loadingCard = document.querySelector(".loading-card");

      function loadingDoneMessage() {
        document.getElementById("progress").style.zIndex = 0;
        return "Entering the kingdom.";
      }

      function markRuntimeLive() {
        loadingCard.classList.add("runtime-live");
      }

      var Module = {
        preRun: [],
        postRun: [],
        print: function () {
          var element = document.getElementById("output");
          if (element) {
            element.value = "";
          }
          return function (text) {
            if (arguments.length > 1) {
              text = Array.prototype.slice.call(arguments).join(" ");
            }
            console.log(text);
            if (element) {
              element.value += text + "\n";
              element.scrollTop = element.scrollHeight;
            }
          };
        }(),
        printErr: function (text) {
          if (arguments.length > 1) {
            text = Array.prototype.slice.call(arguments).join(" ");
          }
          console.error(text);
        },
        canvas: function () {
          var canvas = document.getElementById("canvas");
          canvas.addEventListener(
            "webglcontextlost",
            function (event) {
              alert("WebGL context lost. You will need to reload the page.");
              event.preventDefault();
            },
            false
          );
          return canvas;
        }(),
        locateFile: function (path, prefix) {
          if (path.endsWith(".wasm")) {
            return prefix + path + "?v=" + runtimeVersion;
          }
          return prefix + path;
        },
        setStatus: function (text) {
          if (!Module.setStatus.last) {
            Module.setStatus.last = { time: Date.now(), text: "" };
          }
          if (text === Module.setStatus.last.text) {
            return;
          }

          var match = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (match && now - Module.setStatus.last.time < 30) {
            return;
          }

          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;

          if (match) {
            text = match[1];
            progressElement.value = 100 * parseInt(match[2], 10);
            progressElement.max = 100 * parseInt(match[4], 10);
            progressElement.hidden = false;
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
          }

          if (text && text.length > 0) {
            console.log(new Date().toLocaleTimeString() + " " + text);
            statusElement.style.display = "block";
          } else {
            statusElement.style.display = "none";
            markRuntimeLive();
          }

          statusElement.textContent = text;
        },
        totalDependencies: 0,
        monitorRunDependencies: function (left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(
            left
              ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")"
              : loadingDoneMessage()
          );
        }
      };

      Module.setStatus("Summoning the adventure...");
      window.onerror = function () {
        statusElement.classList.add("error");
        Module.setStatus("A miscast spell struck the runtime. See the console.");
        Module.setStatus = function (text) {
          if (text) {
            Module.printErr("[post-exception status] " + text);
          }
        };
      };
    </script>
    <script async src="scummvm.js?v=20260408b"></script>
  </body>
</html>
